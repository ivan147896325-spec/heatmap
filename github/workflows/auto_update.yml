name: Auto Update Heatmap

on:
  schedule:
    - cron: '0 0 * * 1'  # 每週一自動執行
  workflow_dispatch:      # 允許手動點擊按鈕立即執行

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install pandas folium
      - name: Run script
        run: python update_data.py
      - name: Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html filtered_accidents.csv
          git commit -m "Auto update heatmap data" || exit 0
          git push
