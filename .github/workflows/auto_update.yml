name: Auto Update Heatmap

on:
  schedule:
    # 每週一上午 8:00 (UTC 0點) 自動執行
    - cron: '0 0 * * 1'
  workflow_dispatch: # 支援在 Actions 頁籤手動按鈕執行

permissions:
  contents: write # 確保擁有寫入 GitHub Repository 的權限

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 檢出程式碼 (升級至 v4)
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 設定 Python 環境 (升級至 v5)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 安裝必要套件
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas folium

      # 4. 執行 Python 腳本抓取最新 3 個月資料並生成地圖
      - name: Run update script
        run: python update_data.py

      # 5. 將生成的 index.html 與 CSV 自動 Commit 並 Push 回專案
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html filtered_accidents.csv || true
          git commit -m "Auto update heatmap data [skip ci]" || exit 0
          git push
